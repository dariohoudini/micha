name: MICHA CI

# Runs on every push to main / staging / develop AND every PR targeting
# main or staging. Jobs are independent — secret-scan, lint, backend
# tests, and frontend build can all run in parallel and short-circuit
# on first failure.
#
# Each job is documented inline so a new contributor can read the
# workflow top-to-bottom and understand what it enforces.

on:
  push:
    branches: [main, staging, develop]
  pull_request:
    branches: [main, staging]

jobs:

  # ── Security: scan for secrets accidentally committed ─────────────
  # Catches forgotten API keys / DB passwords / SECRET_KEYs in diffs
  # BEFORE they hit main. The .pre-commit-config.yaml runs detect-secrets
  # locally; this is the belt-and-braces server-side check.
  secret-scan:
    name: Secret Scanning
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history for diff against base ref

      - name: Check for secrets in this diff
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: HEAD~1
          head: HEAD

  # ── Lint: Python style + format ───────────────────────────────────
  # flake8 catches dead code, unused imports, undefined names.
  # black enforces uniform formatting at 120-col so PR diffs aren't
  # noisy with whitespace-only changes.
  lint:
    name: Lint (Python)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'

      - name: Install lint tools
        run: pip install flake8==7.0.0 black==24.3.0

      - name: flake8
        run: |
          flake8 apps/ config/ middleware/ \
            --max-line-length=120 \
            --exclude=migrations \
            --extend-ignore=E501,W503,E203
        # E501: long lines (black handles wrapping decisions)
        # W503: line break before binary operator (black-compat)
        # E203: whitespace before colon (black-compat for slices)

      - name: black --check
        run: |
          black --check apps/ config/ middleware/ \
            --exclude='migrations|node_modules|venv'
        continue-on-error: true
        # Soft-fail until the codebase has been black-formatted in
        # one pass; this comment-out tracker for the formatting PR.

  # ── Backend tests: pytest against Postgres + Redis services ───────
  # Uses the SAME pytest invocation a developer runs locally (just
  # with TEST_DB_POSTGRES=1 so the test DB matches production).
  # Migrations run automatically via pytest-django's default fixture.
  # If a developer adds a model change without a migration, the test
  # DB setup fails and CI catches it before merge.
  test-backend:
    name: Backend Tests (pytest)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: micha_test
          POSTGRES_USER: micha_user
          POSTGRES_PASSWORD: test_pass
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-retries 10

      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-retries 10

    env:
      # Test-mode SECRET_KEY: long enough to pass the boot-time guard
      # (40-char minimum). Random per run would be better but a fixed
      # string keeps cached layers reusable.
      SECRET_KEY: test-ci-secret-key-min-40-chars-aaaaaaaaaaaaaaaa
      DEBUG: 'True'

      # DB / Redis matching the service container config above.
      DB_NAME: micha_test
      DB_USER: micha_user
      DB_PASSWORD: test_pass
      DB_HOST: localhost
      DB_PORT: '5432'
      REDIS_URL: redis://localhost:6379/0

      # Real Fernet key so EncryptedCharField fields can actually
      # encrypt/decrypt during tests (the 2FA encryption tests, the
      # bank account tests, etc.). Generated once; safe to commit
      # because it's only used against the test DB.
      FIELD_ENCRYPTION_KEY: XGG4Y1gf3jGtfnchHSORV2lIyeh0Sj6-j8Hn4ECHVJo=

      # Force the test DB to Postgres (matches production) instead of
      # the SQLite fallback the test_settings provides for local dev.
      TEST_DB_POSTGRES: '1'

      # Migration guard bypass — test DB is ephemeral, no
      # production-data risk.
      MIGRATION_UNSAFE_ALLOWED: '1'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-django pytest-cov

      - name: Wait for Postgres
        run: |
          for i in {1..30}; do
            if pg_isready -h localhost -U micha_user -d micha_test; then
              echo "Postgres ready"; break
            fi
            sleep 1
          done

      - name: Django check
        # Static system check — catches schema/setting issues that
        # would otherwise only surface at first request.
        run: python manage.py check --deploy --fail-level WARNING || python manage.py check
        continue-on-error: true

      - name: Check makemigrations is up to date
        # If a model field was changed but the migration not generated,
        # this fires. Prevents PRs that would diverge prod schema from
        # the models.
        run: python manage.py makemigrations --check --dry-run

      - name: Run pytest with coverage
        run: |
          pytest \
            apps/ledger apps/idempotency apps/inventory \
            apps/fx apps/payments apps/outbox \
            apps/users apps/orders apps/disputes \
            --tb=short \
            --cov=apps \
            --cov-report=term-missing:skip-covered \
            --cov-report=xml:coverage.xml \
            -p no:cacheprovider
        # We list the test directories explicitly rather than `pytest`
        # auto-discover so we KNOW which apps are covered. New apps
        # with tests must be added here — that's intentional friction.

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 14

  # ── Frontend: lint + build ────────────────────────────────────────
  # Catches JSX syntax errors, missing imports, type mismatches that
  # would only surface in the browser. Vite build is fast (~1min).
  # When tests are added (Vitest + React Testing Library, Roadmap 5),
  # they slot in here.
  test-frontend:
    name: Frontend Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build (vite)
        run: npm run build
        env:
          # Build-time API URL — overridden per environment in the
          # actual deploy. CI just needs SOMETHING set so the
          # ``VITE_API_BASE_URL`` constant isn't empty.
          VITE_API_BASE_URL: https://api.staging.micha.co.ao/api

      - name: Bundle-size check
        # Fails the build if the main bundle exceeds 300KB gzipped.
        # Keeps the frontend honest on mobile-first Angola traffic
        # (flaky 4G, every KB matters).
        run: |
          MAIN_SIZE=$(stat -c %s dist/assets/index-*.js 2>/dev/null || stat -f %z dist/assets/index-*.js)
          MAX_SIZE=400000  # ~400KB raw, ~120KB gzipped
          if [ "$MAIN_SIZE" -gt "$MAX_SIZE" ]; then
            echo "Main bundle is $MAIN_SIZE bytes — exceeds $MAX_SIZE limit"
            echo "Investigate via: npx vite-bundle-visualizer"
            exit 1
          fi
          echo "Main bundle size: $MAIN_SIZE bytes (limit $MAX_SIZE) ✓"

  # ── Docker image build ────────────────────────────────────────────
  # Multi-stage build from docker/Dockerfile. Uses buildx + the GHA
  # cache backend so unchanged-deps PRs rebuild in ~30s instead of
  # ~3min (the deps layer is cached separately from the source layer).
  #
  # Soft size check warns if the tarball exceeds 800MB (≈ 500MB
  # compressed image). The multi-stage Dockerfile should keep us
  # comfortably under that.
  #
  # Push step is commented until the registry decision lands
  # (ECR vs GHCR vs Docker Hub).
  build-docker:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: [test-backend]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image with cache
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: false
          tags: micha-api:${{ github.sha }},micha-api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          outputs: type=docker,dest=/tmp/micha-api.tar

      - name: Image size check
        run: |
          size_bytes=$(stat -c %s /tmp/micha-api.tar)
          size_mb=$((size_bytes / 1024 / 1024))
          echo "Image tarball: ${size_mb}MB"
          if [ "$size_mb" -gt 800 ]; then
            echo "::warning::Image is large (${size_mb}MB); review deps"
          fi

      # Push to GHCR — enable once GHCR_TOKEN is configured.
      # - name: Login to GHCR
      #   if: github.ref == 'refs/heads/main'
      #   uses: docker/login-action@v3
      #   with:
      #     registry: ghcr.io
      #     username: ${{ github.actor }}
      #     password: ${{ secrets.GITHUB_TOKEN }}
      # - name: Push to GHCR
      #   if: github.ref == 'refs/heads/main'
      #   run: |
      #     docker load --input /tmp/micha-api.tar
      #     docker tag micha-api:${{ github.sha }} ghcr.io/${{ github.repository }}/micha-api:${{ github.sha }}
      #     docker push ghcr.io/${{ github.repository }}/micha-api:${{ github.sha }}
