<!doctype html>
<html lang="pt">
  <head>
    <meta charset="UTF-8" />

    <!-- Safe area support — CRITICAL for notch/dynamic island devices -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />

    <!-- PWA / App config -->
    <meta name="theme-color" content="#0A0A0A" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="MICHA Express" />
    <meta name="application-name" content="MICHA Express" />

    <!-- Security headers via meta (server should also set these) -->
    <meta http-equiv="X-Content-Type-Options" content="nosniff" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600;700&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600&display=swap"
      rel="stylesheet"
    />

    <!-- Prevent flash of unstyled content -->
    <style>
      body { background-color: #0A0A0A; }
    </style>

    <title>MICHA Express</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
