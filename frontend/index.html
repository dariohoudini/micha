<!doctype html>
<html lang="pt">
  <head>
    <meta charset="UTF-8" />

    <!-- Safe area support — CRITICAL for notch/dynamic island devices -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />

    <!-- PWA / App config -->
    <meta name="theme-color" content="#0A0A0A" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="MICHA Express" />
    <meta name="application-name" content="MICHA Express" />

    <!-- Security headers via meta (server should also set these) -->
    <meta http-equiv="X-Content-Type-Options" content="nosniff" />

    <!-- Preconnect to API origin for faster first request -->
    <link rel="preconnect" href="http://127.0.0.1:8000" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,600;0,700;1,700&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&display=swap"
      rel="preload"
      as="style"
      onload="this.onload=null;this.rel='stylesheet'"
    />
    <noscript>
      <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600;700&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet" />
    </noscript>

    <!-- SEO / Social -->
    <meta name="description" content="MICHA Express — A marketplace angolano premium" />
    <meta property="og:title" content="MICHA Express" />
    <meta property="og:description" content="Compre e venda com confiança" />
    <meta property="og:type" content="website" />
    <meta name="robots" content="noindex, nofollow" />

    <!-- Prevent flash of unstyled content -->
    <style>
      body { background-color: #0A0A0A; }
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>

    <title>MICHA Express</title>
  </head>
  <body>
    <div id="root" role="application" aria-label="MICHA Express"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
