# MICHA — nginx production configuration
# FIX: WebSocket connection rate limiting
# FIX: Static files served by nginx (not Python)
# FIX: Media files served by nginx
# FIX: Gzip compression for API responses
# FIX: SSL termination

# Limit WebSocket connections per IP
limit_conn_zone $binary_remote_addr zone=ws_limit:10m;
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=100r/m;

upstream micha_api {
    server 127.0.0.1:8000;
    keepalive 32;
}

# HTTP → HTTPS redirect
server {
    listen 80;
    server_name micha.app www.micha.app;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name micha.app www.micha.app;

    # SSL
    ssl_certificate /etc/letsencrypt/live/micha.app/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/micha.app/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_types application/json application/javascript text/css text/plain;
    gzip_min_length 1000;

    client_max_body_size 10M;

    # FIX: Static files served by nginx — never by Python
    location /static/ {
        alias /app/staticfiles/;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # FIX: Media files served by nginx in dev (use S3+CloudFront in production)
    location /media/ {
        alias /app/media/;
        expires 30d;
        add_header Cache-Control "public";
        access_log off;
    }

    # FIX: WebSocket — rate limit connections per IP
    location /ws/ {
        # Max 10 simultaneous WebSocket connections per IP
        limit_conn ws_limit 10;

        proxy_pass http://micha_api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;  # 24 hours — keep WS alive
    }

    # Health check — no rate limiting, no logging
    location /health/ {
        proxy_pass http://micha_api;
        proxy_set_header Host $host;
        access_log off;
    }

    # API — rate limited
    location /api/ {
        limit_req zone=api_limit burst=20 nodelay;

        proxy_pass http://micha_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_read_timeout 120;
        proxy_connect_timeout 10;
    }

    # Everything else → API
    location / {
        proxy_pass http://micha_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }
}
