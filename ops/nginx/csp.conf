# ops/nginx/csp.conf
# ──────────────────
#
# Content-Security-Policy header for the MICHA frontend (R1 Sprint 3).
#
# Why this file lives in /ops/nginx
# ──────────────────────────────────
# CSP is set at the edge proxy, NOT in Django — adding CSP headers in
# Django middleware works for backend-served pages, but the SPA is
# served by nginx (or whatever CDN/edge fronts the static bundle).
# Putting it here keeps the policy with the asset-serving config.
#
# How to use
# ──────────
#   include /etc/nginx/conf.d/csp.conf;
# inside the server {} block that serves frontend/dist.
#
# Policy decisions
# ────────────────
# default-src 'self'              — only same-origin by default
# script-src                      — own scripts only. Inline scripts
#                                   FORBIDDEN (Vite builds don't need
#                                   them; this also blocks XSS payloads)
# style-src 'self' 'unsafe-inline' — Tailwind + Framer Motion emit
#                                   inline style attributes
# img-src 'self' data: blob: https:
#                                  — data: for embedded SVGs; https: so
#                                    seller-hosted product images work
# connect-src                     — API (MICHA backend) + Sentry endpoint
# font-src 'self' data:            — webfont data URIs
# frame-ancestors 'none'           — defence against clickjacking
# form-action 'self'               — never submit a form off-domain
# object-src 'none'                — no <object>/<embed>
# upgrade-insecure-requests        — auto-upgrade http→https
#
# When changing this file
# ───────────────────────
# Sentry's DSN host changes per project — substitute via env.
# Add CDN-served domains (CloudFront, image CDN) to img-src + connect-src
# as they come online.

add_header Content-Security-Policy "
    default-src 'self';
    script-src 'self' 'wasm-unsafe-eval' https://browser.sentry-cdn.com;
    style-src 'self' 'unsafe-inline';
    img-src 'self' data: blob: https:;
    media-src 'self' blob: data: https:;
    connect-src 'self' https://*.micha.ao https://*.sentry.io https://o*.ingest.sentry.io wss://*.micha.ao;
    font-src 'self' data:;
    frame-ancestors 'none';
    form-action 'self';
    object-src 'none';
    base-uri 'self';
    upgrade-insecure-requests;
" always;

# Additional defence-in-depth headers — pair well with CSP.
add_header X-Content-Type-Options "nosniff" always;
add_header X-Frame-Options "DENY" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;
# Permissions-Policy — block features MICHA doesn't use.
add_header Permissions-Policy "
    accelerometer=(),
    camera=(self),
    geolocation=(self),
    gyroscope=(),
    magnetometer=(),
    microphone=(),
    payment=(),
    usb=()
" always;

# HSTS — declare HTTPS-only. 1 year, include subdomains. Add ``preload``
# only after submitting to the HSTS preload list (hstspreload.org).
add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
